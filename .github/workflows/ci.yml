name: web-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NPM_REGISTRY_URL: ${{ secrets.NPM_REGISTRY_URL }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Configure private npm feed
        if: ${{ env.NPM_REGISTRY_URL != '' && env.NPM_TOKEN != '' }}
        run: |
          npm config set registry "$NPM_REGISTRY_URL"
          REGISTRY_HOST="${NPM_REGISTRY_URL#https://}"
          echo "//$REGISTRY_HOST/:_authToken=$NPM_TOKEN" > ~/.npmrc
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
